{% extends "layouts/base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<div class="container">

    <div class="text-center mb-5">

        <h1 class="fw-bold">
            Welcome, {{ current_user.full_name }}
        </h1>

        <p class="text-muted">
            Campus Election Management System Dashboard
        </p>

    </div>

    <div class="row g-4">

        <div class="col-md-4">

            <div class="card shadow border-0 text-center">

                <div class="card-body">

                    <h2>🗳️</h2>

                    <h5>Election Status</h5>

                    <p>No active election.</p>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow border-0 text-center">

                <div class="card-body">

                    <h2>👤</h2>

                    <h5>My Profile</h5>

                    <a href="{{ url_for('main.profile') }}" class="btn btn-primary">
                        View Profile
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow border-0 text-center">

                <div class="card-body">

                    <h2>📊</h2>

                    <h5>Voting Result</h5>

                    <p>Coming Soon</p>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
